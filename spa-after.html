<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스파 식물 인테리어 완성</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1f17; font-family:'Noto Serif KR',serif; color:#e8f0e4; }

  header {
    text-align:center;
    padding:2.5rem 1rem 1.5rem;
    background:linear-gradient(180deg,#1a1f17,#1a1f17);
  }
  header p { font-family:'Cormorant Garamond',serif; font-style:italic; color:#8a9a7b; letter-spacing:.3em; font-size:.85rem; margin-bottom:.5rem; }
  header h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(1.6rem,4vw,2.8rem); color:#e8f0e4; }
  header h1 span { color:#c9a84c; }

  /* Toggle */
  .toggle-wrap {
    display:flex; justify-content:center; gap:0; margin:1.5rem auto;
    border:1px solid #3a4a35; border-radius:40px; overflow:hidden; width:fit-content;
  }
  .toggle-btn {
    padding:.55rem 1.8rem; font-size:.8rem; letter-spacing:.15em;
    cursor:pointer; border:none; background:transparent; color:#8a9a7b;
    font-family:'Noto Serif KR',serif; transition:all .3s ease;
  }
  .toggle-btn.active { background:#5a7a52; color:#fff; }

  /* Main viewer */
  .viewer {
    position:relative; max-width:900px; margin:0 auto;
    overflow:hidden; border-radius:4px;
    box-shadow:0 20px 80px rgba(0,0,0,.6);
  }

  .photo-base {
    width:100%; display:block; user-select:none;
  }

  /* Plant overlay layer */
  .plant-layer {
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none;
    transition:opacity .8s ease;
  }
  .plant-layer.hidden { opacity:0; }
  .plant-layer.visible { opacity:1; }

  /* Green ambient overlay */
  .ambient {
    position:absolute; inset:0;
    background:radial-gradient(ellipse at 30% 80%, rgba(90,122,82,.12) 0%, transparent 60%),
               radial-gradient(ellipse at 70% 50%, rgba(138,154,123,.08) 0%, transparent 50%);
    transition:opacity .8s ease;
  }

  /* Labels */
  .plant-label {
    position:absolute;
    background:rgba(20,30,18,.82);
    border:1px solid rgba(138,154,123,.4);
    color:#c5d4bf;
    font-size:.68rem;
    padding:.28rem .7rem;
    border-radius:20px;
    letter-spacing:.08em;
    backdrop-filter:blur(6px);
    white-space:nowrap;
    opacity:0;
    transform:translateY(6px);
    transition:opacity .5s ease, transform .5s ease;
    pointer-events:none;
  }
  .plant-layer.visible .plant-label {
    opacity:1; transform:translateY(0);
  }

  /* Connector dot */
  .dot {
    position:absolute; width:8px; height:8px;
    background:#c9a84c; border-radius:50%;
    box-shadow:0 0 0 3px rgba(201,168,76,.25);
  }

  /* Info bar */
  .info-bar {
    max-width:900px; margin:.8rem auto 0;
    display:grid; grid-template-columns:repeat(3,1fr); gap:1px;
    background:#2a3525;
  }
  .info-cell {
    background:#1a1f17; padding:1.1rem 1.2rem; text-align:center;
  }
  .info-cell .num { font-family:'Cormorant Garamond',serif; font-size:1.8rem; color:#c9a84c; }
  .info-cell .lbl { font-size:.7rem; letter-spacing:.15em; color:#5a7a52; margin-top:.2rem; }

  /* Caption */
  .caption {
    text-align:center; padding:2rem 1rem 3rem;
    font-size:.8rem; color:#4a5a45; letter-spacing:.1em;
  }
  .caption strong { color:#8a9a7b; }
</style>
</head>
<body>

<header>
  <p>— Before & After —</p>
  <h1>식물 인테리어 <span>완성 후</span> 모습</h1>
</header>

<div class="toggle-wrap">
  <button class="toggle-btn active" id="btnBefore" onclick="show('before')">BEFORE</button>
  <button class="toggle-btn" id="btnAfter" onclick="show('after')">AFTER 🌿</button>
</div>

<div class="viewer">
  <!-- 원본 사진 -->
  <img class="photo-base" src="/mnt/user-data/uploads/IMG_8007.jpeg" alt="스파 인테리어">

  <!-- 식물 SVG 오버레이 -->
  <svg class="plant-layer hidden" id="plantLayer" viewBox="0 0 1000 1350" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Leaf green gradients -->
      <radialGradient id="lg1" cx="40%" cy="30%"><stop offset="0%" stop-color="#6aaa5a"/><stop offset="100%" stop-color="#2d5a28"/></radialGradient>
      <radialGradient id="lg2" cx="50%" cy="20%"><stop offset="0%" stop-color="#7ab86a"/><stop offset="100%" stop-color="#3a6a30"/></radialGradient>
      <radialGradient id="lg3" cx="50%" cy="25%"><stop offset="0%" stop-color="#8ac47a"/><stop offset="100%" stop-color="#4a7a40"/></radialGradient>
      <radialGradient id="lg4" cx="40%" cy="30%"><stop offset="0%" stop-color="#5a9a4a"/><stop offset="100%" stop-color="#234a20"/></radialGradient>
      <linearGradient id="stem1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#4a6a40"/><stop offset="100%" stop-color="#2a4220"/></linearGradient>
      <linearGradient id="potG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e8e0d0"/><stop offset="100%" stop-color="#c8b8a0"/></linearGradient>
      <linearGradient id="potDark" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c0b090"/><stop offset="100%" stop-color="#907850"/></linearGradient>
      <filter id="leafShadow"><feDropShadow dx="3" dy="6" stdDeviation="6" flood-color="#1a2a15" flood-opacity="0.45"/></filter>
      <filter id="softShadow"><feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#0a1a08" flood-opacity="0.35"/></filter>
    </defs>

    <!-- ===== 1. 입구 왼쪽 대형 몬스테라 ===== -->
    <g transform="translate(290,600)" filter="url(#leafShadow)">
      <!-- pot -->
      <ellipse cx="0" cy="185" rx="38" ry="12" fill="#b0a080" opacity=".5"/>
      <path d="M-38,185 Q-40,240 -30,255 Q0,270 30,255 Q40,240 38,185Z" fill="url(#potG)"/>
      <ellipse cx="0" cy="185" rx="38" ry="12" fill="url(#potDark)" opacity=".6"/>
      <!-- stem -->
      <line x1="0" y1="185" x2="-10" y2="80" stroke="url(#stem1)" stroke-width="5"/>
      <line x1="0" y1="185" x2="15" y2="60" stroke="url(#stem1)" stroke-width="4"/>
      <line x1="0" y1="185" x2="-5" y2="20" stroke="url(#stem1)" stroke-width="6"/>
      <!-- Monstera leaves - big split leaves -->
      <g opacity=".92">
        <!-- leaf 1 left -->
        <path d="M-10,80 C-80,40 -120,-10 -90,-60 C-60,-100 -10,-80 10,-40 C30,0 20,50 -10,80Z" fill="url(#lg1)"/>
        <path d="M-10,80 C-55,40 -80,0 -60,-40" fill="none" stroke="#1a4010" stroke-width="1.2" opacity=".5"/>
        <!-- notches -->
        <path d="M-80,10 C-70,5 -65,15 -75,20Z" fill="#1a2a15" opacity=".4"/>
        <path d="M-95,-30 C-83,-35 -78,-22 -90,-18Z" fill="#1a2a15" opacity=".4"/>
        <!-- leaf 2 right -->
        <path d="M15,60 C70,20 120,-20 100,-75 C80,-120 30,-100 10,-60 C-5,-20 0,30 15,60Z" fill="url(#lg2)"/>
        <path d="M15,60 C55,20 80,-20 65,-65" fill="none" stroke="#1a4010" stroke-width="1.2" opacity=".5"/>
        <path d="M105,-35 C92,-42 90,-25 102,-22Z" fill="#1a2a15" opacity=".4"/>
        <!-- leaf 3 top center -->
        <path d="M-5,20 C-50,-30 -40,-100 0,-130 C40,-155 70,-110 60,-60 C50,-20 20,10 -5,20Z" fill="url(#lg3)"/>
        <path d="M-5,20 C-30,-25 -20,-90 5,-120" fill="none" stroke="#1a4010" stroke-width="1.5" opacity=".5"/>
        <path d="M-35,-60 C-22,-68 -18,-52 -30,-47Z" fill="#1a2a15" opacity=".4"/>
        <path d="M50,-80 C40,-90 36,-74 46,-70Z" fill="#1a2a15" opacity=".4"/>
      </g>
    </g>

    <!-- ===== 2. 입구 오른쪽 아레카야자 ===== -->
    <g transform="translate(680,580)" filter="url(#leafShadow)">
      <ellipse cx="0" cy="200" rx="35" ry="11" fill="#b0a080" opacity=".5"/>
      <path d="M-35,200 Q-37,255 -27,268 Q0,280 27,268 Q37,255 35,200Z" fill="url(#potG)"/>
      <ellipse cx="0" cy="200" rx="35" ry="11" fill="url(#potDark)" opacity=".6"/>
      <!-- areca palm - multiple thin fronds -->
      <g opacity=".88" stroke="#1a4010" stroke-width=".8">
        <!-- frond stems radiating from base -->
        <line x1="0" y1="200" x2="-80" y2="60" stroke="url(#stem1)" stroke-width="3"/>
        <line x1="0" y1="200" x2="-40" y2="20" stroke="url(#stem1)" stroke-width="3"/>
        <line x1="0" y1="200" x2="0" y2="-10" stroke="url(#stem1)" stroke-width="3.5"/>
        <line x1="0" y1="200" x2="40" y2="30" stroke="url(#stem1)" stroke-width="3"/>
        <line x1="0" y1="200" x2="70" y2="80" stroke="url(#stem1)" stroke-width="3"/>
        <!-- leaflets on left frond -->
        <g fill="url(#lg2)">
          <ellipse cx="-50" cy="120" rx="18" ry="6" transform="rotate(-30,-50,120)"/>
          <ellipse cx="-62" cy="95" rx="16" ry="5" transform="rotate(-35,-62,95)"/>
          <ellipse cx="-72" cy="72" rx="14" ry="4" transform="rotate(-38,-72,72)"/>
          <ellipse cx="-30" cy="130" rx="18" ry="6" transform="rotate(-25,-30,130)"/>
          <ellipse cx="-42" cy="105" rx="16" ry="5" transform="rotate(-28,-42,105)"/>
        </g>
        <!-- leaflets on center frond -->
        <g fill="url(#lg3)">
          <ellipse cx="-20" cy="70" rx="20" ry="6" transform="rotate(-10,-20,70)"/>
          <ellipse cx="-10" cy="40" rx="18" ry="5" transform="rotate(-5,-10,40)"/>
          <ellipse cx="0" cy="10" rx="16" ry="5"/>
          <ellipse cx="20" cy="70" rx="20" ry="6" transform="rotate(10,20,70)"/>
          <ellipse cx="10" cy="40" rx="18" ry="5" transform="rotate(5,10,40)"/>
        </g>
        <!-- leaflets on right frond -->
        <g fill="url(#lg1)">
          <ellipse cx="50" cy="125" rx="18" ry="6" transform="rotate(30,50,125)"/>
          <ellipse cx="60" cy="100" rx="16" ry="5" transform="rotate(35,60,100)"/>
          <ellipse cx="68" cy="78" rx="14" ry="4" transform="rotate(38,68,78)"/>
          <ellipse cx="30" cy="133" rx="18" ry="6" transform="rotate(25,30,133)"/>
        </g>
      </g>
    </g>

    <!-- ===== 3. 왼쪽 벽 행잉 스킨답서스 ===== -->
    <g transform="translate(95,420)" filter="url(#softShadow)">
      <!-- wall bracket -->
      <rect x="-8" y="-15" width="16" height="10" rx="2" fill="#d4c4a8"/>
      <!-- hanging pot -->
      <path d="M-22,0 Q-25,35 -18,48 Q0,58 18,48 Q25,35 22,0Z" fill="url(#potG)"/>
      <ellipse cx="0" cy="0" rx="22" ry="7" fill="url(#potDark)" opacity=".7"/>
      <!-- trailing vines -->
      <g opacity=".9">
        <path d="M-10,30 C-20,80 -35,140 -50,190 C-60,225 -45,250 -30,220 C-20,200 -25,170 -15,140 C-5,110 5,80 -5,50Z" fill="url(#lg3)"/>
        <path d="M0,30 C-5,90 -10,160 -5,210 C0,240 15,230 12,200 C8,170 5,130 8,90 C10,60 5,35 0,30Z" fill="url(#lg2)"/>
        <path d="M10,30 C20,85 30,150 20,200 C15,225 30,235 38,205 C42,185 35,155 28,120 C22,90 18,55 10,30Z" fill="url(#lg1)"/>
        <!-- heart-shaped leaves along vines -->
        <ellipse cx="-35" cy="160" rx="12" ry="9" transform="rotate(-20,-35,160)" fill="url(#lg4)"/>
        <ellipse cx="-12" cy="120" rx="11" ry="8" transform="rotate(-5,-12,120)" fill="url(#lg3)"/>
        <ellipse cx="8" cy="170" rx="12" ry="9" transform="rotate(15,8,170)" fill="url(#lg2)"/>
        <ellipse cx="28" cy="135" rx="10" ry="8" transform="rotate(20,28,135)" fill="url(#lg1)"/>
      </g>
    </g>

    <!-- ===== 4. 소파 옆 산세베리아 ===== -->
    <g transform="translate(590,810)" filter="url(#softShadow)">
      <ellipse cx="0" cy="105" rx="22" ry="7" fill="#a09070" opacity=".5"/>
      <path d="M-22,105 Q-23,135 -16,145 Q0,152 16,145 Q23,135 22,105Z" fill="url(#potG)"/>
      <!-- sanseveria upright leaves -->
      <g opacity=".9">
        <path d="M-8,105 C-12,70 -15,30 -10,-20 C-8,-50 -3,-55 0,-50 C3,-55 8,-50 10,-20 C15,30 12,70 8,105Z" fill="url(#lg1)"/>
        <path d="M-8,105 C-14,75 -18,40 -14,-5 C-12,-32 -6,-38 -4,-35 C-2,-38 4,-32 6,-5 C10,40 6,75 8,105Z" fill="url(#lg3)" opacity=".7"/>
        <!-- lighter stripes -->
        <path d="M-4,80 C-5,50 -4,10 -2,-30" stroke="#a0d090" stroke-width="2" fill="none" opacity=".3"/>
        <path d="M4,80 C5,50 4,10 2,-30" stroke="#a0d090" stroke-width="2" fill="none" opacity=".3"/>
      </g>
    </g>

    <!-- ===== 5. 리셉션 데스크 위 소형 화분 ===== -->
    <g transform="translate(815,910)" filter="url(#softShadow)">
      <!-- small decorative pot -->
      <ellipse cx="0" cy="28" rx="18" ry="6" fill="#c8b090" opacity=".6"/>
      <path d="M-18,28 Q-19,50 -12,58 Q0,64 12,58 Q19,50 18,28Z" fill="url(#potG)"/>
      <!-- small plant - peace lily style -->
      <g opacity=".88">
        <path d="M0,28 C-15,-5 -25,-35 -15,-55 C-8,-68 5,-62 8,-45 C12,-28 5,0 0,28Z" fill="url(#lg3)"/>
        <path d="M0,28 C5,-5 15,-35 10,-55 C6,-68 -3,-62 -5,-45 C-8,-28 -3,0 0,28Z" fill="url(#lg2)"/>
        <path d="M0,28 C-5,5 -8,-20 -4,-42 C-2,-54 3,-54 5,-42 C8,-20 5,5 0,28Z" fill="url(#lg4)"/>
      </g>
    </g>

    <!-- ===== 6. 정수기 옆 보스턴 고사리 ===== -->
    <g transform="translate(200,890)" filter="url(#softShadow)">
      <ellipse cx="0" cy="80" rx="30" ry="9" fill="#a09070" opacity=".5"/>
      <path d="M-30,80 Q-32,115 -22,128 Q0,138 22,128 Q32,115 30,80Z" fill="url(#potG)"/>
      <!-- fern fronds -->
      <g opacity=".88">
        <path d="M-5,80 C-30,50 -55,20 -70,-10 C-80,-30 -65,-45 -50,-30 C-35,-18 -20,10 -5,40Z" fill="url(#lg2)"/>
        <path d="M5,80 C30,50 55,20 70,-10 C80,-30 65,-45 50,-30 C35,-18 20,10 5,40Z" fill="url(#lg2)"/>
        <path d="M0,80 C-10,45 -15,5 -5,-30 C2,-52 8,-52 15,-30 C22,5 18,45 0,80Z" fill="url(#lg3)"/>
        <!-- leaflets -->
        <g fill="url(#lg4)" opacity=".8">
          <ellipse cx="-45" cy="10" rx="10" ry="4" transform="rotate(-40,-45,10)"/>
          <ellipse cx="-58" cy="-5" rx="9" ry="3.5" transform="rotate(-42,-58,-5)"/>
          <ellipse cx="-32" cy="22" rx="10" ry="4" transform="rotate(-35,-32,22)"/>
          <ellipse cx="45" cy="10" rx="10" ry="4" transform="rotate(40,45,10)"/>
          <ellipse cx="58" cy="-5" rx="9" ry="3.5" transform="rotate(42,58,-5)"/>
          <ellipse cx="32" cy="22" rx="10" ry="4" transform="rotate(35,32,22)"/>
        </g>
      </g>
    </g>

    <!-- ===== 7. 천장 행잉 (원형 몰딩 아래) ===== -->
    <g transform="translate(500,165)" filter="url(#softShadow)">
      <!-- hanging rope -->
      <line x1="0" y1="-30" x2="0" y2="0" stroke="#8a7050" stroke-width="2" opacity=".7"/>
      <!-- small hanging basket -->
      <path d="M-18,0 Q-20,28 -12,38 Q0,46 12,38 Q20,28 18,0Z" fill="#c4a870"/>
      <ellipse cx="0" cy="0" rx="18" ry="6" fill="#d4b880" opacity=".8"/>
      <!-- trailing plants from ceiling -->
      <g opacity=".82">
        <path d="M-8,30 C-18,70 -28,115 -22,150 C-18,170 -8,168 -5,148 C-2,128 -5,85 -5,50Z" fill="url(#lg3)"/>
        <path d="M8,30 C18,70 28,115 22,150 C18,170 8,168 5,148 C2,128 5,85 5,50Z" fill="url(#lg2)"/>
        <path d="M0,30 C5,75 2,130 0,160 C-2,175 5,175 8,158 C10,140 6,90 2,50Z" fill="url(#lg4)"/>
        <ellipse cx="-18" cy="115" rx="10" ry="7" transform="rotate(-15,-18,115)" fill="url(#lg1)" opacity=".8"/>
        <ellipse cx="18" cy="120" rx="10" ry="7" transform="rotate(15,18,120)" fill="url(#lg1)" opacity=".8"/>
      </g>
    </g>

    <!-- ===== LABELS ===== -->
    <!-- Label positions matching plants -->
    <g font-family="sans-serif">
      <!-- 1 Monstera left of entrance -->
      <g transform="translate(190,530)">
        <circle r="4" fill="#c9a84c"/>
        <rect x="10" y="-12" width="110" height="22" rx="11" fill="rgba(20,30,18,.82)"/>
        <text x="65" y="3" text-anchor="middle" fill="#c5d4bf" font-size="13">🌿 몬스테라</text>
      </g>
      <!-- 2 Areca right of entrance -->
      <g transform="translate(740,530)">
        <circle r="4" fill="#c9a84c"/>
        <rect x="-120" y="-12" width="110" height="22" rx="11" fill="rgba(20,30,18,.82)"/>
        <text x="-65" y="3" text-anchor="middle" fill="#c5d4bf" font-size="13">🌴 아레카야자</text>
      </g>
      <!-- 3 Hanging left wall -->
      <g transform="translate(95,320)">
        <circle r="4" fill="#c9a84c"/>
        <rect x="10" y="-12" width="130" height="22" rx="11" fill="rgba(20,30,18,.82)"/>
        <text x="75" y="3" text-anchor="middle" fill="#c5d4bf" font-size="13">🪴 스킨답서스</text>
      </g>
      <!-- 4 Sanseveria sofa -->
      <g transform="translate(630,780)">
        <circle r="4" fill="#c9a84c"/>
        <rect x="-128" y="-12" width="118" height="22" rx="11" fill="rgba(20,30,18,.82)"/>
        <text x="-69" y="3" text-anchor="middle" fill="#c5d4bf" font-size="13">🌱 산세베리아</text>
      </g>
      <!-- 5 Desk plant -->
      <g transform="translate(830,870)">
        <circle r="4" fill="#c9a84c"/>
        <rect x="-130" y="-12" width="120" height="22" rx="11" fill="rgba(20,30,18,.82)"/>
        <text x="-70" y="3" text-anchor="middle" fill="#c5d4bf" font-size="13">✨ 데스크 화분</text>
      </g>
      <!-- 6 Fern water dispenser -->
      <g transform="translate(240,840)">
        <circle r="4" fill="#c9a84c"/>
        <rect x="10" y="-12" width="120" height="22" rx="11" fill="rgba(20,30,18,.82)"/>
        <text x="70" y="3" text-anchor="middle" fill="#c5d4bf" font-size="13">🌿 보스턴고사리</text>
      </g>
      <!-- 7 Ceiling hanging -->
      <g transform="translate(560,190)">
        <circle r="4" fill="#c9a84c"/>
        <rect x="10" y="-12" width="120" height="22" rx="11" fill="rgba(20,30,18,.82)"/>
        <text x="70" y="3" text-anchor="middle" fill="#c5d4bf" font-size="13">✨ 천장 행잉</text>
      </g>
    </g>
  </svg>

  <!-- ambient green glow -->
  <div class="ambient" id="ambient" style="opacity:0;transition:opacity .8s ease;"></div>
</div>

<div class="info-bar">
  <div class="info-cell"><div class="num">7</div><div class="lbl">식물 배치 포인트</div></div>
  <div class="info-cell"><div class="num">5종</div><div class="lbl">추천 식물</div></div>
  <div class="info-cell"><div class="num">🌿</div><div class="lbl">공기정화 + 힐링 효과</div></div>
</div>

<div class="caption">
  <strong>AFTER</strong> 버튼을 눌러 완성된 모습을 확인하세요 · 각 라벨은 실제 배치 위치를 나타냅니다
</div>

<script>
  function show(mode) {
    const layer = document.getElementById('plantLayer');
    const ambient = document.getElementById('ambient');
    const btnB = document.getElementById('btnBefore');
    const btnA = document.getElementById('btnAfter');
    if (mode === 'after') {
      layer.classList.remove('hidden');
      layer.classList.add('visible');
      ambient.style.opacity = '1';
      btnA.classList.add('active');
      btnB.classList.remove('active');
    } else {
      layer.classList.remove('visible');
      layer.classList.add('hidden');
      ambient.style.opacity = '0';
      btnB.classList.add('active');
      btnA.classList.remove('active');
    }
  }
</script>
</body>
</html>
